{% extends "base.html" %}
{% set body_class = "welcome-page" %}

{% block content %}
<section class="welcome-shell">
    <div class="welcome-art">
        <img class="welcome-logo" src="{{ url_for('static', path='images/logo.png') }}" alt="Logo de Edupets">
        <img class="welcome-pet" src="{{ url_for('static', path='images/pet.png') }}" alt="Mascota de Edupets">
    </div>
    <div class="welcome-copy">
        <h1>Bienvenido a Edupets</h1>
        <div class="welcome-actions">
            {% if request.state.username %}
                <a class="primary-button" href="/pet">Ir a mi mascota</a>
                <a class="secondary-button" href="/activities">Actividades</a>
            {% else %}
                <a class="primary-button" href="/login">Iniciar sesión</a>
                <a class="secondary-button" href="/register">Registrarse</a>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
