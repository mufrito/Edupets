{% extends "base.html" %}
{% set body_class = "auth-page" %}

{% block content %}
<section class="auth-shell">
    <form class="auth-form" method="post" action="/register">
        <img src="{{ url_for('static', path='images/logo.png') }}" alt="Edupets" class="form-logo">
        <h1>Registrarse</h1>
        {% if error %}
            <p class="form-error">{{ error }}</p>
        {% endif %}
        <input type="hidden" name="csrf_token" value="{{ request.state.csrf_token }}">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" value="{{ username or '' }}" autocomplete="username" required minlength="3" maxlength="30">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="6">
        <button class="primary-button" type="submit">Crear cuenta</button>
        <a class="form-link" href="/login">Ya tengo cuenta</a>
    </form>
</section>
{% endblock %}
